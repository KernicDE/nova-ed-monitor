name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build pyinstaller

      - name: Install project dependencies
        run: pip install -e .

      - name: Build Python distribution (sdist + wheel)
        run: python -m build

      - name: Build Linux standalone binary
        run: |
          sudo apt-get install -y libsdl2-dev libsdl2-mixer-dev
          pyinstaller \
            --onefile \
            --name nova \
            --collect-all textual \
            --collect-all edge_tts \
            --hidden-import pygame \
            --hidden-import httpx \
            ed_monitor/__main__.py
          mv dist/nova dist/nova-linux-x86_64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/nova-linux-x86_64
          body: |
            ## Installation

            ### Option 1: pip from GitHub (recommended)
            ```bash
            # Linux
            pip install git+https://github.com/KernicDE/nova-ed-monitor.git

            # Windows
            py -m pip install git+https://github.com/KernicDE/nova-ed-monitor.git
            ```

            ### Option 2: Install the wheel from this release
            Download the `.whl` file above, then:
            ```bash
            # Linux
            pip install nova_ed_monitor-*.whl

            # Windows
            py -m pip install nova_ed_monitor-*.whl
            ```

            ### Option 3: Standalone Linux binary (no Python needed)
            Download `nova-linux-x86_64`, make it executable, run:
            ```bash
            chmod +x nova-linux-x86_64
            ./nova-linux-x86_64
            ```

            ### Running NOVA
            ```bash
            nova          # Linux (after pip install)
            py -m ed_monitor  # Windows
            ```
