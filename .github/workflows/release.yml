name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine pyinstaller

      - name: Install project dependencies
        run: pip install -e .

      - name: Build Python distribution (sdist + wheel)
        run: python -m build

      - name: Build Linux standalone binary
        run: |
          pyinstaller \
            --onefile \
            --name nova \
            --hidden-import pygame \
            --hidden-import textual \
            --hidden-import httpx \
            --hidden-import edge_tts \
            -m ed_monitor
          mv dist/nova dist/nova-linux-x86_64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/nova-linux-x86_64
          body: |
            ## Installation

            ### Option 1: pipx (recommended)
            ```bash
            pipx install nova-ed-monitor
            ```

            ### Option 2: pip
            ```bash
            pip install nova-ed-monitor
            ```

            ### Option 3: Standalone Linux binary
            Download `nova-linux-x86_64`, make executable, run:
            ```bash
            chmod +x nova-linux-x86_64
            ./nova-linux-x86_64
            ```
            Note: The standalone binary requires `edge-tts` to be installed separately:
            ```bash
            pip install edge-tts
            ```

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build-and-release
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
