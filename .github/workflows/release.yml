name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build pyinstaller

      - name: Install project dependencies
        run: pip install -e .

      - name: Build Python distribution (sdist + wheel)
        run: python -m build

      - name: Build Linux standalone binary
        run: |
          sudo apt-get install -y libsdl2-dev libsdl2-mixer-dev
          pyinstaller \
            --onefile \
            --name nova \
            --collect-all textual \
            --collect-all edge_tts \
            --hidden-import pygame \
            --hidden-import httpx \
            ed_monitor/__main__.py
          mv dist/nova dist/nova-linux-x86_64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/nova-linux-x86_64
            nova.sh
            nova.ps1
            nova.bat
          body: |
            ## Installation

            ### Option 1: Launcher scripts — recommended

            **Linux:**
            ```bash
            curl -O https://raw.githubusercontent.com/KernicDE/nova-ed-monitor/main/nova.sh
            chmod +x nova.sh
            ./nova.sh
            ```

            **Windows:**
            Download `nova.ps1` and `nova.bat` from this release into the same folder,
            then double-click **`nova.bat`**.

            The scripts install Python and NOVA automatically if needed, and check for
            updates on every launch. On Linux a `nova` command is also installed to
            `~/.local/bin/nova` which auto-updates on every invocation as well.

            ---

            ### Option 2: Standalone Linux binary (no Python needed)
            Download `nova-linux-x86_64`, then:
            ```bash
            chmod +x nova-linux-x86_64
            ./nova-linux-x86_64
            ```

            ### Option 3: pip from GitHub (manual, use a venv)
            ```bash
            # Linux
            python -m venv ~/nova-venv
            ~/nova-venv/bin/pip install git+https://github.com/KernicDE/nova-ed-monitor.git
            ~/nova-venv/bin/nova

            # Windows
            py -m pip install git+https://github.com/KernicDE/nova-ed-monitor.git
            nova
            ```

            ### Option 4: Install the wheel from this release
            Download the `.whl` file, then:
            ```bash
            pip install nova_ed_monitor-*.whl        # Linux (inside venv)
            py -m pip install nova_ed_monitor-*.whl  # Windows
            ```

            ---

            ## Uninstalling

            **Linux:** `nova --uninstall`

            **Windows:** `.\nova.ps1 -Uninstall` (or `nova.bat -Uninstall`)

            Elite Dangerous journal files are never touched.
