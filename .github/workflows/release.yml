name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build pyinstaller

      - name: Install project dependencies
        run: pip install -e .

      - name: Build Python distribution (sdist + wheel)
        run: python -m build

      - name: Build Linux standalone binary
        run: |
          sudo apt-get install -y libsdl2-dev libsdl2-mixer-dev
          pyinstaller \
            --onefile \
            --name nova \
            --collect-all textual \
            --collect-all edge_tts \
            --hidden-import pygame \
            --hidden-import httpx \
            ed_monitor/__main__.py
          mv dist/nova dist/nova-linux-x86_64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/nova-linux-x86_64
            nova.sh
            nova.ps1
            nova.bat
          body: |
            ## Installation

            ### Option 1: Launcher scripts (recommended — installs everything automatically)

            **Linux:**
            ```bash
            curl -O https://raw.githubusercontent.com/KernicDE/nova-ed-monitor/main/nova.sh
            chmod +x nova.sh
            ./nova.sh
            ```

            **Windows:**
            Download `nova.ps1` and `nova.bat` from this release into the same folder,
            then double-click **`nova.bat`**.

            The scripts install Python and NOVA automatically, then launch NOVA.
            Pass `--update` / `-Update` to check for updates.

            ---

            ### Option 2: pip from GitHub
            ```bash
            # Linux
            pip install git+https://github.com/KernicDE/nova-ed-monitor.git

            # Windows
            py -m pip install git+https://github.com/KernicDE/nova-ed-monitor.git
            ```

            ### Option 3: Install the wheel from this release
            Download the `.whl` file, then:
            ```bash
            pip install nova_ed_monitor-*.whl       # Linux
            py -m pip install nova_ed_monitor-*.whl  # Windows
            ```

            ### Option 4: Standalone Linux binary (no Python needed)
            Download `nova-linux-x86_64`, then:
            ```bash
            chmod +x nova-linux-x86_64
            ./nova-linux-x86_64
            ```

            ### Running NOVA (after pip install)
            ```bash
            nova          # Linux
            py -m ed_monitor  # Windows (or just: nova)
            ```
